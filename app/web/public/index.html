<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FortiFlow — Analyseur de logs FortiGate</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-brand">SNS Security</div>
      <div class="logo-text">FortiFlow</div>
      <div class="logo-sub">Traffic Log Analyzer</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Navigation</div>
      <div class="nav-item active" data-view="dashboard" role="button" tabindex="0">
        <span class="nav-icon">◈</span> Dashboard
      </div>
      <div class="nav-item" data-view="analyse" role="button" tabindex="0">
        <span class="nav-icon">≡</span> Analyse
        <span class="nav-badge" id="badge-analyse">–</span>
      </div>
      <div class="nav-item" data-view="polices" role="button" tabindex="0">
        <span class="nav-icon">◎</span> Policies
        <span class="nav-badge" id="badge-polices">–</span>
      </div>
      <div class="nav-item" data-view="deploy" role="button" tabindex="0">
        <span class="nav-icon">⊙</span> Déploiement
      </div>
    </div>

    <!-- Hidden badge targets for backward compat -->
    <span id="badge-flows" style="display:none"></span>
    <span id="badge-groups" style="display:none"></span>
    <span id="badge-policies" style="display:none"></span>
    <span id="badge-consilpolicies" style="display:none"></span>
    <span id="badge-denied" style="display:none"></span>

    <div class="sidebar-section">
      <div class="sidebar-label">Ressources</div>
      <a class="nav-item nav-item-pdf" href="/GUIDE_UTILISATEUR.pdf" target="_blank" download>
        <span class="nav-icon nav-icon-pdf">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="9" y1="13" x2="15" y2="13"/>
            <line x1="9" y1="17" x2="15" y2="17"/>
            <polyline points="9 9 10 9"/>
          </svg>
        </span>
        Guide utilisateur
        <span class="nav-pdf-badge">PDF</span>
      </a>
    </div>


    <div id="sidebar-history" class="sidebar-section" style="display:none">
      <div class="sidebar-label">Historique</div>
      <div id="ws-history-list"></div>
    </div>

    <div id="sidebar-session" class="sidebar-session" style="display:none">
      <div>Session active</div>
      <div class="session-file" id="session-filename"></div>
      <div class="session-clear" id="btn-clear-session">✕ Fermer la session</div>
    </div>
  </nav>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <div>
        <div class="topbar-title" id="view-title">FortiFlow</div>
        <div class="topbar-sub"  id="view-sub">Chargez un fichier de log pour commencer</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button id="btn-theme" title="Thème clair/sombre" aria-label="Basculer le thème clair/sombre" style="background:none;border:none;cursor:pointer;font-size:16px;padding:4px 6px;color:var(--text2);">🌙</button>
        <div style="display:flex;gap:8px;" id="topbar-actions"></div>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- Progress overlay -->
<div id="progress-overlay">
  <div class="progress-spinner"></div>
  <div class="progress-text" id="progress-text">Analyse en cours…</div>
  <div class="progress-bar-track"><div id="progress-bar-fill"></div></div>
  <div class="progress-sub" id="progress-detail">Parsing du fichier, merci de patienter</div>
</div>

<!-- Matrix tooltip -->
<div id="matrix-tooltip"></div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept=".log,.txt,.csv,.gz,.zip,.xlsx,.xls">

<script src="app.js?v=20260401a"></script>
</body>
</html>
