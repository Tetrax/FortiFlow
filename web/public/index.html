<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FortiFlow — Analyseur de logs FortiGate</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-brand">SNS Security</div>
      <div class="logo-text">FortiFlow</div>
      <div class="logo-sub">Traffic Log Analyzer</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Navigation</div>
      <div class="nav-item active" data-view="dashboard">
        <span class="nav-icon">◈</span> Dashboard
      </div>
      <div class="nav-item" data-view="analyse">
        <span class="nav-icon">≡</span> Analyse
        <span class="nav-badge" id="badge-analyse">–</span>
      </div>
      <div class="nav-item" data-view="polices">
        <span class="nav-icon">◎</span> Policies
        <span class="nav-badge" id="badge-polices">–</span>
      </div>
      <div class="nav-item" data-view="deploy">
        <span class="nav-icon">⊙</span> Déploiement
      </div>
    </div>

    <!-- Hidden badge targets for backward compat -->
    <span id="badge-flows" style="display:none"></span>
    <span id="badge-groups" style="display:none"></span>
    <span id="badge-policies" style="display:none"></span>
    <span id="badge-consilpolicies" style="display:none"></span>
    <span id="badge-denied" style="display:none"></span>

    <div class="sidebar-mode-toggle">
      <label class="mode-toggle-label">
        <input type="checkbox" id="expert-mode-toggle">
        <span class="mode-toggle-knob"></span>
        Mode expert
      </label>
    </div>

    <div id="sidebar-session" class="sidebar-session" style="display:none">
      <div>Session active</div>
      <div class="session-file" id="session-filename"></div>
      <div class="session-clear" id="btn-clear-session">✕ Fermer la session</div>
    </div>
  </nav>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <div>
        <div class="topbar-title" id="view-title">FortiFlow</div>
        <div class="topbar-sub"  id="view-sub">Chargez un fichier de log pour commencer</div>
      </div>
      <div style="display:flex;gap:8px;" id="topbar-actions"></div>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- Progress overlay -->
<div id="progress-overlay">
  <div class="progress-spinner"></div>
  <div class="progress-text" id="progress-text">Analyse en cours…</div>
  <div class="progress-bar-track"><div id="progress-bar-fill"></div></div>
  <div class="progress-sub" id="progress-detail">Parsing du fichier, merci de patienter</div>
</div>

<!-- Matrix tooltip -->
<div id="matrix-tooltip"></div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept=".log,.txt,.csv,.gz,.zip,.xlsx,.xls">

<script src="app.js"></script>
</body>
</html>
