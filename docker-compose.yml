services:
  fortiflow:
    build:
      context: ./app/web
      dockerfile: Dockerfile
    container_name: fortiflow
    restart: unless-stopped
    ports:
      - "3737:3737"
    environment:
      - PORT=3737
      # HTTPS optionnel — décommenter si certificats disponibles :
      # - SSL_KEY=/certs/privkey.pem
      # - SSL_CERT=/certs/fullchain.pem
    volumes:
      # Persistance des sessions et des workspaces entre redémarrages
      - ./data/sessions-cache:/sessions-cache
      - ./data/workspaces:/app/workspaces
      # HTTPS — monter le répertoire des certificats en lecture seule :
      # - /etc/ssl/fortiflow:/certs:ro
