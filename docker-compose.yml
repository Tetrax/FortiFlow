services:
  fortiflow:
    build:
      context: ./app/web
      dockerfile: Dockerfile
    container_name: fortiflow
    restart: unless-stopped
    ports:
      - "443:443"
    environment:
      - PORT=443
      - SSL_KEY=/certs/privkey.pem
      - SSL_CERT=/certs/fullchain.pem
    volumes:
      # Persistance des sessions et des workspaces entre redémarrages
      - ./data/sessions-cache:/sessions-cache
      - ./data/workspaces:/app/workspaces
      # Certificats TLS — adapter le chemin selon ton PKI interne :
      - /etc/ssl/fortiflow:/certs:ro
